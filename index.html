<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store">
<title>Driving in the USA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html, body { width:100%; height:100dvh; min-height:100vh; overflow:hidden; background:#111; display:flex; justify-content:center; align-items:center; font-family:'Courier New',monospace; }

#gameboy {
  width:  min(100vw, calc(100dvh * 0.565));
  height: min(100dvh, calc(100vw / 0.565));
  background: linear-gradient(160deg, #d4cfb8 0%, #c4bfa8 60%, #b8b39e 100%);
  border-radius: 22px;
  box-shadow: inset 2px 3px 10px rgba(255,255,255,.55), inset -2px -3px 8px rgba(0,0,0,.25), 6px 10px 28px rgba(0,0,0,.65);
  display: flex; flex-direction: column;
  padding: 14px 14px 18px; gap: 10px;
  position: relative; overflow:hidden;
}
#gameboy::after {
  content:''; position:absolute; inset:0; border-radius:22px; pointer-events:none; z-index:9999;
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='250'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.68' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='250' height='250' filter='url(%23n)'/></svg>");
  opacity:0.07; mix-blend-mode:overlay;
}

#screen-wrapper {
  flex: 0 0 54%;
  background: #1e1e1e;
  border-radius: 14px;
  padding: 7px;
  box-shadow: inset 4px 4px 14px rgba(0,0,0,.85), inset -1px -1px 4px rgba(255,255,255,.08);
  position: relative; overflow: hidden;
  cursor: crosshair; touch-action: none;
}
#screen-wrapper::before {
  content:''; position:absolute; inset:5px; border-radius:9px; background:#0d1a0d; z-index:0;
}
#gameCanvas {
  width:100%; height:100%; display:block; border-radius:9px; position:relative; z-index:1;
  filter: sepia(.1) saturate(.9) brightness(.95);
}
#crosshair {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:rgba(190,215,190,.6); font-size:18px; font-weight:100; pointer-events:none; z-index:6;
  text-shadow:0 0 8px rgba(80,200,80,.3); line-height:1;
}

#hud {
  position:absolute; top:9px; left:11px; right:11px;
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:2px;
  z-index:10; pointer-events:none;
  font-size:clamp(14px,3.6vw,20px);
  color:rgba(185,215,185,.92); text-shadow:0 0 6px rgba(0,220,0,.35); letter-spacing:.04em;
  line-height:1.1;
}
#track-bar {
  position:absolute; bottom:7px; left:9px; right:9px;
  z-index:10; pointer-events:none;
  font-size:clamp(16px,4.3vw,24px);
  color:rgba(170,210,170,.85); text-shadow:0 0 5px rgba(0,200,0,.3);
  white-space:normal; word-break:break-word;
  text-align:center; line-height:1.2;
}
#dpad-center-dot { color:#555; }
#dpad-center.pl-active #dpad-center-dot { color:#ff2020; text-shadow:0 0 8px #ff0000,0 0 16px #ff0000; }
.pl-name-small { font-size:0.7em; }

#loading-screen, #start-overlay, #sound-panel {
  position:absolute; inset:0; z-index:20; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-radius:9px; padding:12px;
}
#loading-screen { background:rgba(10,20,10,.95); color:#8dc88d; font-size:clamp(9px,2.5vw,13px); gap:8px; }
#start-overlay  { background:rgba(8,15,8,.92); color:#aadaaa; justify-content:space-between; }
#start-overlay h1 { font-size:21px; color:#c8e8c8; letter-spacing:.05em; text-align:center; margin-bottom:2px; white-space:nowrap; }
#overlay-top { display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:22%; }
#overlay-main { display:flex; flex-direction:column; align-items:center; gap:30px; }
#overlay-bottom { display:flex; justify-content:flex-end; width:100%; }
#start-overlay .ctrl-hint { font-size:clamp(6px,1.6vw,8.5px); color:#669966; text-align:center; line-height:1.6; }

.vol-row-sm { display:flex; align-items:center; gap:6px; width:100%; }
.vol-row-sm label { font-size:clamp(6px,1.5vw,8px); color:#88aa88; min-width:4em; text-align:right; }
.vol-row-sm input[type=range] { flex:1; accent-color:#6a8; height:14px; cursor:pointer; }
.vol-row-sm span { font-size:clamp(6px,1.5vw,8px); color:#99bb99; min-width:2.5em; }

#audio-load-msg { font-size:clamp(12px,3vw,16px); color:#557755; text-align:center; }
#start-btn {
  margin-top:4px; padding:6px 18px;
  background:transparent; color:#aaddaa; border:1px solid #446644;
  font-family:inherit; font-size:clamp(18px,4.6vw,26px); cursor:pointer; letter-spacing:.05em;
  border-radius:4px;
}
#start-btn:disabled { opacity:.4; cursor:default; }
#start-btn:not(:disabled):active { background:rgba(100,180,100,.15); }

#usa-btn {
  display:block; padding:3px 10px; text-decoration:none;
  background:transparent; color:#88bb88; border:1px solid #335533;
  font-family:inherit; font-size:12px; cursor:pointer; letter-spacing:.03em; white-space:nowrap;
  border-radius:4px;
}
#usa-btn:active { background:rgba(100,180,100,.15); }
#explain-btn {
  padding:4px 14px;
  background:transparent; color:#88bb88; border:1px solid #335533;
  font-family:inherit; font-size:clamp(16px,4.1vw,23px); cursor:pointer; letter-spacing:.05em;
  border-radius:4px;
}
#explain-btn:active { background:rgba(80,160,80,.15); }

#explain-panel { position:fixed; inset:0; z-index:9999; display:flex; flex-direction:column; background:#090f09; gap:10px; padding:12px; }
#explain-content { flex:1; overflow-y:auto; overflow-x:hidden; width:100%; display:flex; flex-direction:column; gap:12px; align-items:center; touch-action:pan-y; -webkit-overflow-scrolling:touch; }
#explain-content img { width:100%; max-width:640px; display:block; border-radius:4px; }

#explain-back-btn {
  flex-shrink:0; padding:5px 20px;
  background:transparent; color:#aaddaa; border:1px solid #446644;
  font-family:inherit; font-size:clamp(14px,3.6vw,20px); cursor:pointer; letter-spacing:.05em;
  border-radius:4px;
}
#explain-back-btn:active { background:rgba(100,180,100,.15); }

#lightbox {
  position:fixed; inset:0; z-index:10001; background:rgba(0,0,0,.97);
  overflow:auto; -webkit-overflow-scrolling:touch; touch-action:pan-x pan-y;
  cursor:zoom-out; display:flex; align-items:flex-start; justify-content:flex-start;
}
#lightbox img { display:block; width:auto; height:auto; min-width:100%; }

#sound-panel { background:rgba(8,15,8,.95); z-index:18; display:none; gap:14px; touch-action:auto; }
#sound-panel h2 { font-size:clamp(16px,4vw,22px); color:#99cc99; }
.vol-block { width:100%; display:flex; flex-direction:column; gap:6px; }
.vol-block label { font-size:clamp(18px,4.5vw,24px); color:#88aa88; }
.vol-block-slider { display:flex; align-items:center; gap:8px; width:100%; }
.vol-block-slider span { font-size:clamp(10px,2.5vw,14px); color:#99bb99; min-width:2.8em; }

#connecting-bar {
  position:absolute; top:25%; left:9px; right:9px;
  z-index:10; pointer-events:none;
  font-size:clamp(24px,6vw,34px);
  font-weight:bold;
  color:rgba(155,200,155,.9);
  text-align:center; display:none;
  white-space:normal; word-break:break-word; line-height:1.2;
}

#controls { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; gap:8px; }
#controls-mid { flex:3; min-height:0; display:flex; align-items:stretch; gap:20px; overflow:hidden; }

#dpad-housing {
  align-self:flex-end; height:81%; aspect-ratio:1; flex-shrink:0; max-width:210px;
  background:none; border:none; padding:0; box-shadow:none; border-radius:0;
}
#dpad { width:100%; height:100%; display:grid; grid-template-columns:1fr 1.1fr 1fr; grid-template-rows:1fr 1.1fr 1fr; gap:2px; }
.dpad-btn {
  background:linear-gradient(145deg,#2a2a2a,#111); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .08s, box-shadow .08s;
  box-shadow:1px 1px 3px rgba(0,0,0,.5), -1px -1px 2px rgba(255,255,255,.08);
}
.dpad-btn.pressed, .dpad-btn:active { background:linear-gradient(145deg,#111,#2a2a2a); box-shadow:inset 2px 2px 5px rgba(0,0,0,.7); }
.dpad-arrow { color:#888; font-size:clamp(11px,3.5vw,18px); pointer-events:none; }

#dpad-up     { grid-area:1/2; border-radius:5px 5px 2px 2px; }
#dpad-left   { grid-area:2/1; border-radius:5px 2px 2px 5px; }
#dpad-center { grid-area:2/2; border-radius:4px; background:#1a1a1a; }
#dpad-right  { grid-area:2/3; border-radius:2px 5px 5px 2px; }
#dpad-down   { grid-area:3/2; border-radius:2px 2px 5px 5px; }
#dpad-corner-tl { grid-area:1/1; background:transparent!important; box-shadow:none!important; }
#dpad-corner-tr { grid-area:1/3; background:transparent!important; box-shadow:none!important; }
#dpad-corner-bl { grid-area:3/1; background:transparent!important; box-shadow:none!important; }
#dpad-corner-br { grid-area:3/3; background:transparent!important; box-shadow:none!important; }

#sliders-area { flex:1; align-self:flex-end; display:flex; flex-direction:column; justify-content:space-between; gap:3px; padding-left:8%; padding-right:5%; }
#color-sliders-row { display:flex; flex-direction:row; align-items:stretch; gap:5px; }
#slider-container {
  flex:1;
  background:linear-gradient(160deg,#a8a48e,#989080);
  border-radius:12px; padding:2px 8px 2px;
  box-shadow:inset 4px 4px 9px rgba(0,0,0,.38), inset -1px -1px 3px rgba(255,255,255,.22);
  display:flex; flex-direction:column; justify-content:space-evenly; gap:0;
}
.slider-col { display:flex; flex-direction:column; flex:1; justify-content:center; }
.slider-inline { display:flex; align-items:center; gap:4px; }
.slider-inline input[type=range] { flex:1; }
.color-side-label { font-size:clamp(10px,2.5vw,14px); font-weight:bold; color:#2a2818; white-space:nowrap; }
#sky-btns-col { display:flex; flex-direction:column; gap:4px; width:clamp(28px,9vw,40px); flex-shrink:0; align-items:center; justify-content:space-around; }
#sky-btns-col .toggle-btn { width:100%; height:auto; aspect-ratio:1; border-radius:50%; }
.tick-row { height:8px; padding:0 2px; margin-bottom:6px; background:repeating-linear-gradient(to right,#888 0px,#888 1px,transparent 1px,transparent 7px); background-size:calc(100%/13) 100%; }
#slider-container .tick-row { height:2px; margin-bottom:0; }
#speed-row { display:flex; flex-direction:row; align-items:center; gap:5px; }
#speed-slider-wrap { flex:1; }
.speed-side-label { width:clamp(28px,9vw,40px); flex-shrink:0; text-align:center; font-size:clamp(11px,2.8vw,15px); font-weight:bold; color:#2a2818; }

input[type=range] { width:100%; height:56px; -webkit-appearance:none; appearance:none; background:transparent; cursor:pointer; }
input[type=range]::-webkit-slider-runnable-track { height:5px; background:linear-gradient(to right,#666,#888); border-radius:3px; box-shadow:inset 2px 2px 5px rgba(0,0,0,.6); }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:9px; height:26px;
  background:repeating-linear-gradient(to bottom,#444 0px,#444 2px,#111 2px,#111 5px);
  border-radius:3px; margin-top:-11px;
  box-shadow:2px 2px 6px rgba(0,0,0,.7), -1px -1px 2px rgba(255,255,255,.15);
}
input[type=range]::-moz-range-track { height:5px; background:#777; border-radius:3px; }
input[type=range]::-moz-range-thumb { width:9px; height:26px; background:repeating-linear-gradient(to bottom,#444 0px,#444 2px,#111 2px,#111 5px); border-radius:3px; border:none; box-shadow:2px 2px 6px rgba(0,0,0,.7); }
#slider-container input[type=range] { height:18px; }
#slider-container input[type=range]::-webkit-slider-thumb { width:9px; height:18px; margin-top:-7px; }
#slider-container input[type=range]::-moz-range-thumb { width:9px; height:18px; }
#speed-row input[type=range] { height:33px; }
#speed-row input[type=range]::-webkit-slider-thumb { width:11px; height:24px; margin-top:-10px; }
#speed-row input[type=range]::-moz-range-thumb { width:11px; height:24px; }

.slider-label { text-align:center; font-size:clamp(13px,3.2vw,16px); color:#1a1810; letter-spacing:.05em; margin-top:4px; }
#slider-container .slider-label { font-size:clamp(12px,3vw,16px); margin-top:2px; color:#2a2818; font-weight:bold; }
#speed-row .slider-label { font-size:clamp(9px,2.3vw,12px); margin-top:1px; color:#2a2818; }

.toggle-btn {
  width:100%; height:clamp(28px,8.5vw,38px); border:none; border-radius:6px;
  background:#0d0d0d;
  box-shadow:inset 1px 1px 4px rgba(0,0,0,.95), 2px 2px 5px rgba(0,0,0,.55);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:color .15s; color:#6aba6a;
}
.toggle-btn svg { width:55%; height:55%; }
.toggle-btn:active { box-shadow:inset 3px 3px 8px rgba(0,0,0,.95); transform:scale(.96); }
.toggle-btn.active { color:#ddd6a8; }
.toggle-label { font-size:clamp(7px,1.9vw,10px); color:#000; font-weight:bold; text-align:center; white-space:nowrap; }
.sky-switch {
  position:relative; display:flex; align-items:center; overflow:hidden;
  width:100%; height:clamp(28px,8.5vw,38px);
  background:#2d5a2d; border-radius:99px;
  box-shadow:inset 2px 2px 5px rgba(0,0,0,.6), inset -1px -1px 3px rgba(255,255,255,.1);
  cursor:pointer; transition:background .2s;
}
.sky-switch.on { background:#3a7a3a; }
.sky-knob {
  position:absolute; top:3px; bottom:3px; left:3px;
  width:calc(50% - 4px);
  background:#cc2222; border-radius:99px;
  box-shadow:1px 1px 4px rgba(0,0,0,.7);
  transition:transform .2s; pointer-events:none; z-index:1;
}
.sky-switch.on .sky-knob { transform:translateX(calc(100% + 2px)); }
.sky-sw-label {
  position:relative; z-index:2; flex:1; text-align:center;
  font-size:clamp(10px,2.8vw,14px); font-weight:bold; color:#fff;
  pointer-events:none; line-height:1;
}

#buttons-row { flex:0.7; display:flex; justify-content:space-evenly; align-items:center; padding:0 2px; }
.action-btn-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.action-btn {
  width:clamp(38px,12.5vw,54px); height:clamp(38px,12.5vw,54px); border-radius:50%; border:none;
  background:linear-gradient(145deg,#2e2e2e,#111);
  box-shadow:3px 3px 8px rgba(0,0,0,.55), -1px -1px 3px rgba(255,255,255,.12), inset 1px 1px 2px rgba(255,255,255,.08);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .1s; color:#888;
}
.action-btn:active { box-shadow:inset 2px 2px 7px rgba(0,0,0,.7); transform:scale(.94); }
.action-btn.active { color:#6aba6a; }
.action-btn svg { width:44%; height:44%; }
.btn-label { font-size:clamp(13px,3.5vw,20px); color:#000; font-weight:bold; text-align:center; white-space:nowrap; }

body.screen-only #gameboy { width:100vw; height:100dvh; padding:0; border-radius:0; box-shadow:none; background:#000; gap:0; }
body.screen-only #gameboy::after { display:none; }
body.screen-only #screen-wrapper { flex:1 1 100%; border-radius:0; box-shadow:none; cursor:pointer; }
body.screen-only #controls { display:none; }
body.screen-only #buttons-row { display:none; }
body.screen-only #screen-wrapper::before { display:none; }
</style>
</head>
<body>

<div id="gameboy">
  <div id="screen-wrapper">
    <div id="loading-screen">
      <div>ロード中...</div>
      <div id="load-progress"></div>
    </div>

    <div id="start-overlay" style="display:none">
      <div id="overlay-top">
        <h1>Driving in the USA</h1>
        <div id="audio-load-msg">読み込み中・・・</div>
      </div>
      <div id="overlay-main">
        <button id="start-btn" disabled>DRIVE START</button>
        <button id="explain-btn">説明</button>
      </div>
      <div id="overlay-bottom">
        <a id="usa-btn" href="https://keroppa88.github.io/driving_tokyo_s/" target="_blank" rel="noopener">Driving in Tokyo</a>
      </div>
    </div>

    <div id="sound-panel">
      <h2>── 音量設定 ──</h2>
      <div class="vol-block">
        <label>エンジン</label>
        <div class="vol-block-slider">
          <input type="range" id="engine-vol2" min="0" max="100" value="70">
          <span id="engine-vol2-lbl">70%</span>
        </div>
      </div>
      <div class="vol-block">
        <label>Music</label>
        <div class="vol-block-slider">
          <input type="range" id="yt-vol2" min="0" max="100" value="70">
          <span id="yt-vol2-lbl">70%</span>
        </div>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="crosshair">+</div>
    <div id="hud">
      <span><span id="hud-speed">0</span>km/h</span>
      <span id="hud-auto" style="display:none;color:#6aba6a;">AUTO</span>
    </div>
    <div id="track-bar"></div>
    <div id="connecting-bar"></div>
  </div>

  <div id="controls">
    <div id="controls-mid">
      <div id="dpad-housing">
        <div id="dpad">
          <div id="dpad-corner-tl"></div>
          <div id="dpad-up" class="dpad-btn" data-dir="up"><span class="dpad-arrow">▲</span></div>
          <div id="dpad-corner-tr"></div>
          <div id="dpad-left" class="dpad-btn" data-dir="left"><span class="dpad-arrow">◀</span></div>
          <div id="dpad-center" class="dpad-btn" data-dir="center"><span class="dpad-arrow" id="dpad-center-dot">●</span></div>
          <div id="dpad-right" class="dpad-btn" data-dir="right"><span class="dpad-arrow">▶</span></div>
          <div id="dpad-corner-bl"></div>
          <div id="dpad-down" class="dpad-btn" data-dir="down"><span class="dpad-arrow">▼</span></div>
          <div id="dpad-corner-br"></div>
        </div>
      </div>

      <div id="sliders-area">
        <div id="color-sliders-row">
          <div id="slider-container">
            <div class="slider-col">
              <div class="tick-row"></div>
              <div class="slider-inline">
                <input type="range" id="sky-color-slider" min="0" max="100" value="59">
                <span class="color-side-label">色調</span>
              </div>
            </div>
            <div class="slider-col">
              <div class="tick-row"></div>
              <div class="slider-inline">
                <input type="range" id="sky-sat-slider" min="0" max="100" value="63">
                <span class="color-side-label">彩度</span>
              </div>
            </div>
            <div class="slider-col">
              <div class="tick-row"></div>
              <div class="slider-inline">
                <input type="range" id="sky-bright-slider" min="0" max="100" value="89">
                <span class="color-side-label">明暗</span>
              </div>
            </div>
          </div>
          <div id="sky-btns-col">
            <button class="toggle-btn" id="btn-star">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/>
              </svg>
            </button>
            <button class="toggle-btn" id="btn-rain">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 12a11.05 11.05 0 0 0-22 0z"/>
                <path d="M12 12v5.5a2.5 2.5 0 0 1-5 0"/>
                <line x1="7" y1="17" x2="6.5" y2="20"/>
                <line x1="17" y1="17" x2="16.5" y2="20"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="speed-row">
          <div id="speed-slider-wrap">
            <input type="range" id="speed-slider" min="0" max="100" value="0">
          </div>
          <span class="speed-side-label">速度</span>
        </div>
        </div>
      </div>
    </div>

    <div id="buttons-row">
      <div class="action-btn-wrap">
        <span class="btn-label" id="lbl-play">再生</span>
        <button class="action-btn active" id="btn-play">
          <svg viewBox="0 0 24 24" fill="currentColor" id="play-icon">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
      </div>
      <div class="action-btn-wrap">
        <span class="btn-label" id="lbl-hud">非表示</span>
        <button class="action-btn active" id="btn-hud">
          <svg id="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
            <path d="M3 3l18 18"/>
          </svg>
        </button>
      </div>
      <div class="action-btn-wrap">
        <span class="btn-label">自動運転</span>

<script type="module">

const scene = new THREE.Scene();

// Sky gradient shader
const skyUniforms = {
  topColor:         { value: new THREE.Color(0x4a6fa0) },
  horizonColor:     { value: new THREE.Color(0xc8daf0) },
  horizonBandColor: { value: new THREE.Color(0xc8daf0) },
};
const skyMat = new THREE.ShaderMaterial({
  uniforms: skyUniforms,
  vertexShader:   `varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `uniform vec3 topColor,horizonColor,horizonBandColor; varying vec3 vPos;
    void main(){ float h=clamp(normalize(vPos).y,0.0,1.0); float b=smoothstep(0.0,0.18,h);
      vec3 lo=mix(horizonBandColor,horizonColor,b); gl_FragColor=vec4(mix(lo,topColor,pow(h,0.85)),1.0); }`,

const skyMesh = new THREE.Mesh(new THREE.SphereGeometry(490,32,15), skyMat);
skyMesh.renderOrder = -1; skyMesh.frustumCulled = false;

let skyTopTarget       = new THREE.Color(0x4a6fa0);

let skyH = 0.592, skyS = 0.63, skyL = 0.88;

function applySkySliders() {
  if (skySliderMode === 0) {
    skyTopTarget.setHSL(skyH, skyS, skyL);
  } else {
    skyHorizTarget = new THREE.Color().setHSL(horizH, horizS, horizL);

function syncSkySliders() {
  const colorEl = document.getElementById('sky-color-slider');
  const satEl = document.getElementById('sky-sat-slider');

  if (!colorEl || !satEl || !brightEl) return;

    colorEl.value = Math.round(skyH * 100);

    brightEl.value = Math.round(Math.max(0, Math.min(100, (skyL - 0.1) / 0.88 * 100)));
  } else {
    colorEl.value = Math.round(horizH * 100);
    satEl.value = Math.round(horizS * 100);

}

function setSkyFromColor(hex, solid = false) {
  skyIsBlack = hex.toLowerCase() === '#000000';

function setSkyHorizBand(hex) {

}
// musiclistの「空#xxxxxx」: 空のてっぺん色を加工せず直接(生)設定。3バーの空色を再現する経路。
function setSkyTopRaw(hex) {

}

function applyHorizDirective(hex) {

}
setSkyFromColor('#9bbae8');

// ─────────────────────────────────────────────

// Wide-angle view controlled by the HORIZONTAL (left-right) field of view.
// onResize derives the vertical fov from this so the horizontal angle stays

const HORIZONTAL_FOV_DEG = 120;
const camera = new THREE.PerspectiveCamera(70, 1, 0.01, 1000);
camera.rotation.order = 'YXZ';
camera.position.set(0, EYE_HEIGHT, -5);

// ─────────────────────────────────────────────
//  LIGHTING
// ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(50, 100, 50);
scene.add(sun);

// ─────────────────────────────────────────────
//  GROUND
// ─────────────────────────────────────────────
const extDesertPlane = (() => {
  // Darker than the GLB terrain's albedo on purpose: AmbientLight is 1.5, so a
  // Unlit (MeshBasicMaterial) on purpose: a lit plane is brightened by the
  // ambient(1.5)+sun lights to ~2.3x and, seen edge-on at the horizon, shows as
  // a bright line where it peeks past the terrain. Unlit keeps a constant desert
  // tone that matches the GLB terrain; fog still fades it to the horizon colour.
  const m = new THREE.Mesh(new THREE.PlaneGeometry(1200,1200), new THREE.MeshBasicMaterial({ color:0x8a7048 }));
  m.rotation.x = -Math.PI/2; m.position.set(0,-0.05,-116); m.frustumCulled = false;
  // Ground rendering disabled so the loop course map is visible.
  m.visible = false; scene.add(m); return m;
})();

// ─────────────────────────────────────────────
//  RAIN
// ─────────────────────────────────────────────
let rainActive = false;
{
  const CNT=5000, SPR=5, TOP=10, SPD=0.3, LEN=0.2;
  const pos = new Float32Array(CNT*6);
  for (let i=0;i<CNT;i++){
    const x=(Math.random()-.5)*SPR*2, y=Math.random()*TOP, z=(Math.random()-.5)*SPR*2, b=i*6;
    pos[b]=x;pos[b+1]=y;pos[b+2]=z;pos[b+3]=x;pos[b+4]=y-LEN;pos[b+5]=z;
  }
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  var rainSystem=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0xaaccff,transparent:true,opacity:1,depthWrite:false}));
  rainSystem.visible=false; rainSystem.frustumCulled=false; scene.add(rainSystem);
  window._updateRain=function(){
    rainSystem.visible=rainActive; if(!rainActive)return;
    const p=rainSystem.geometry.attributes.position.array;
    for(let i=0;i<CNT;i++){const b=i*6;p[b+1]-=SPD;p[b+4]-=SPD;
      if(p[b+4]<-1){const x=(Math.random()-.5)*SPR*2,z=(Math.random()-.5)*SPR*2,y=TOP+Math.random()*4;p[b]=x;p[b+1]=y;p[b+2]=z;p[b+3]=x;p[b+4]=y-LEN;p[b+5]=z;}}
    rainSystem.geometry.attributes.position.needsUpdate=true;
    rainSystem.position.set(camera.position.x,0,camera.position.z);
  };
}

// ─────────────────────────────────────────────
//  STARS
// ─────────────────────────────────────────────
let starActive = false;
{
  const CNT=2000, R=480, pos=new Float32Array(CNT*3);
  for(let i=0;i<CNT;i++){const t=Math.random()*Math.PI*2,p=Math.random()*Math.PI*.5;pos[i*3]=R*Math.sin(p)*Math.cos(t);pos[i*3+1]=R*Math.cos(p);pos[i*3+2]=R*Math.sin(p)*Math.sin(t);}
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  var starSystem=new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:1.1,sizeAttenuation:false,depthWrite:false,fog:false}));
  starSystem.visible=false; starSystem.frustumCulled=false; scene.add(starSystem);
  window._updateStars=function(){ starSystem.visible=starActive; if(starActive)starSystem.position.copy(camera.position); };
}

// ─────────────────────────────────────────────
//  CLOUDS (fbm dome, fully parameter-driven)
// ─────────────────────────────────────────────
// ▼▼▼ ここの数値を変えるだけで雲を調整できます ▼▼▼
const CLOUD_CFG = {
  // 雲1: 速度連動で奥→手前(天球を越えて)流れる積雲
  cloud1: {
    cov:0.40,      // 量(小さいほど多い)
    soft:0.28,     // 縁のやわらかさ
    scale:1.2,    // 粒の細かさ(小さいほど雲が大きい)
    stretch:1.0,   // 横方向の引き伸ばし(1=なし)
    warp:1.6,      // 形のうねり(大きいほど複雑)
    detail:0.8,    // 細部の量(0〜1, 大きいほどチラつきやすい)
    proj:0.06,     // 投影クランプ(小さいほど地平線方向に伸びる)
    minY:0.04,     // 雲が出る最低の高さ(≈山の高さ。ここからぼかし始め)
    band:0.06,     // 出始めのフェード幅(山の高さ→1.5倍あたりで徐々に出現)
    flowBase:0.05,  // 停車時の流れ速度
    flowSpeed:0.06, // 走行速度への連動係数
    drift:0.0,     // 左右ドリフト
    shadow:0.8,    // 最暗部の明るさ(1=真っ白, 0.8=グレー2:白8)
    litSky:0.5,    // 白い下面に地平線色を反映(0〜1)
    shadowSky:0.5, // 影/グレー部に上空色を反映(0〜1)
    opacity:0.9, //全体の不透明度、上げると濃い
  },
  // 雲2: 白い雲、ゆっくり左右に流れ天頂まで分布
  cloud2: {
    cov:0.45, // 量(小さいほど多い)
    soft:0.22, // 縁のやわらかさ
    scale:1.8, // 粒の細かさ(小さいほど雲が大きい)
    stretch:0.4, // 横方向の引き伸ばし(1=なし)
    warp:2,   // 形のうねり(大きいほど複雑)
    detail:0.5, // 細部の量(0〜1, 大きいほどチラつきやすい)
    proj:0.06,  // 投影クランプ(小さいほど地平線方向に伸びる)
    minY:0.30, // 雲が出る最低の高さ(≈山の高さ。ここからぼかし始め)
    band:0.10,  // 出始めのフェード幅(山の高さ→1.5倍あたりで徐々に出現)
    flowBase:0.0,  // 停車時の流れ速度
    flowSpeed:0.01, // 走行速度への連動係数
    drift:0.025, // 左右ドリフト
    shadow:0.85, // 最暗部の明るさ(1=真っ白, 0.8=グレー2:白8)
    litSky:0.5, // 白い下面に地平線色を反映(0〜1)
    shadowSky:0.5, // 影/グレー部に上空色を反映(0〜1)
    opacity:0.85, //全体の不透明度、上げると濃い
  },
};
// ▲▲▲ ここまで ▲▲▲
let cloudActive = false;   // clouds shown
let cloudType   = 1;       // 1 = 雲1, 2 = 雲2
let cloudTime   = 0;
let cloudFlow   = 0;       // accumulated forward flow
let cloudDrift  = 0;       // accumulated left-right drift
{
  const U = {
    uTime:{value:0}, uFlow:{value:0}, uDrift:{value:0},
    uCov:{value:0.4}, uSoft:{value:0.28}, uScale:{value:0.85}, uStretch:{value:1.0},
    uWarp:{value:1.6}, uDetail:{value:1.0}, uProj:{value:0.06},
    uMinY:{value:0.22}, uBand:{value:0.05},
    uShadow:{value:0.8}, uLitSky:{value:0.5}, uShadowSky:{value:0.5}, uOpacity:{value:0.9},
    uSkyColor:{value:new THREE.Color(0x4a6fa0)},  // 上空色
    uSkyHor:{value:new THREE.Color(0xc8daf0)},    // 地平線色
  };
  const cloudVert = `varying vec3 vDir; void main(){ vDir=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`;
  const cloudFrag = `
    precision highp float;
    uniform float uTime,uFlow,uDrift,uCov,uSoft,uScale,uStretch,uWarp,uDetail,uProj,uMinY,uBand,uShadow,uLitSky,uShadowSky,uOpacity;
    uniform vec3 uSkyColor, uSkyHor;
    varying vec3 vDir;
    float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
    float noise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      float a=hash(i), b=hash(i+vec2(1.0,0.0)), c=hash(i+vec2(0.0,1.0)), d=hash(i+vec2(1.0,1.0));
      vec2 u=f*f*(3.0-2.0*f);
      return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
    }
    float fbm(vec2 p){
      float v=0.0, a=0.5;
      for(int i=0;i<6;i++){ v+=a*noise(p); p=p*2.02+vec2(1.7,9.2); a*=0.5; }
      return v;
    }
    void main(){
      vec3 dir=normalize(vDir);
      if(dir.y<=0.01) discard;
      vec2 p = dir.xz/max(dir.y,uProj);
      p *= uScale; p.x *= uStretch;
      vec2 sp = p + vec2(uDrift, -uFlow);
      vec2 q = vec2(fbm(sp), fbm(sp+vec2(3.1,6.7)));
      float base = fbm(sp + uWarp*q);
      float detail = fbm(sp*3.0 + 4.0*q);
      float d = mix(base, base*0.7+detail*0.3, uDetail);
      float dens = smoothstep(uCov, uCov+uSoft, d);
      dens *= smoothstep(uMinY, uMinY+uBand, dir.y);   // 最低の高さより上だけ
      float lit = smoothstep(uCov, uCov+0.5, d);
      vec3 darkest = mix(vec3(0.5), vec3(1.0), uShadow); // 最暗部の明るさ
      // 空色は「明るさそのまま・色相だけ」乗せる(正規化して暗くならない/消えない)
      vec3 horTint = uSkyHor   / max(max(uSkyHor.r,  uSkyHor.g),  max(uSkyHor.b,  0.001));
      vec3 topTint = uSkyColor / max(max(uSkyColor.r,uSkyColor.g),max(uSkyColor.b,0.001));
      vec3 litCol  = mix(vec3(1.0), horTint, uLitSky);          // 白い下面=地平線色相
      vec3 darkCol = mix(darkest, darkest*topTint, uShadowSky); // 影・グレー部=上空色相
      vec3 col = mix(darkCol, litCol, lit);
      float a = dens*uOpacity;
      if(a<0.003) discard;
      gl_FragColor=vec4(col, a);
    }`;
  const cloudMat = new THREE.ShaderMaterial({
    uniforms: U, vertexShader: cloudVert, fragmentShader: cloudFrag,
    side: THREE.BackSide, transparent: true, depthWrite: false, depthTest: true, fog: false,
  });
  const cloudDome = new THREE.Mesh(new THREE.SphereGeometry(700,48,24), cloudMat);
  cloudDome.renderOrder = -0.5; cloudDome.frustumCulled = false; cloudDome.visible = false;
  scene.add(cloudDome);
  window._updateClouds = function(dt){
    cloudDome.visible = cloudActive;
    if(!cloudActive) return;
    const cfg = (cloudType===2) ? CLOUD_CFG.cloud2 : CLOUD_CFG.cloud1;
    const spd = (typeof cruiseSpeed !== 'undefined') ? cruiseSpeed : 0;
    cloudTime  += dt;
    cloudFlow  += dt * (cfg.flowBase + spd*cfg.flowSpeed);
    cloudDrift += dt * cfg.drift;
    U.uTime.value=cloudTime; U.uFlow.value=cloudFlow; U.uDrift.value=cloudDrift;
    U.uCov.value=cfg.cov; U.uSoft.value=cfg.soft; U.uScale.value=cfg.scale; U.uStretch.value=cfg.stretch;
    U.uWarp.value=cfg.warp; U.uDetail.value=cfg.detail; U.uProj.value=cfg.proj;
    U.uMinY.value=cfg.minY; U.uBand.value=cfg.band;
    U.uShadow.value=cfg.shadow; U.uLitSky.value=cfg.litSky; U.uShadowSky.value=cfg.shadowSky; U.uOpacity.value=cfg.opacity;
    U.uSkyColor.value.copy(skyUniforms.topColor.value);
    U.uSkyHor.value.copy(skyUniforms.horizonColor.value);
    cloudDome.position.copy(camera.position);
  };
}

// Sky-decoration button cycle: 0=none, 1=stars, 2=cloud1, 3=cloud2
let skyDecoMode = 0;
const SKY_DECO_ICON = [
  // 0: 星(オフ=緑) — 元の星ボタン
  '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26" fill="currentColor"/>',
  // 1: 星(点灯=白)
  '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26" fill="currentColor"/>',
  // 2: 雲1 — 雲ひとつ
  '<path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z" fill="currentColor"/>',
  // 3: 雲2 — 2つ重なった雲(左上に小さい雲・右下に手前の大きい雲)
  '<g fill="currentColor"><circle cx="6" cy="8" r="2.1"/><circle cx="8.5" cy="6.8" r="2.6"/><circle cx="11" cy="8" r="2.1"/><rect x="5.5" y="7.5" width="6" height="2.3"/></g><g fill="currentColor"><circle cx="11" cy="15" r="2.9"/><circle cx="14.3" cy="13.2" r="3.5"/><circle cx="17.5" cy="14.4" r="2.9"/><circle cx="19.6" cy="15.6" r="2.2"/><rect x="10.5" y="14.5" width="9.6" height="3.2"/></g>',
];

function buildMountainRings() {
  // White silhouette mask; final colour comes from material.color so the
  // mountains can be tinted toward the horizon colour every frame.
  function makeTex(seed,rs=1){
    const W=2048,H=512,cv=document.createElement('canvas'); cv.width=W;cv.height=H;
    const ctx=cv.getContext('2d'); ctx.clearRect(0,0,W,H);
    const prof=new Float32Array(W+1);
    for(let x=0;x<=W;x++){const t=x/W*Math.PI*2;let h=0;h+=.30*Math.sin(t*3+seed);h+=.20*Math.sin(t*7+seed*1.3);h+=.10*Math.sin(t*13+seed*.7);h+=.05*Math.sin(t*23+seed*2.1);h+=.03*Math.sin(t*41+seed*1.7);prof[x]=h;}
    const mn=Math.min(...prof),mx=Math.max(...prof);
    ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.moveTo(0,H);
    for(let x=0;x<=W;x++){const n=(prof[x]-mn)/(mx-mn);ctx.lineTo(x,H*(.60+(1-n)*.38*rs));}
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
    return new THREE.CanvasTexture(cv);
  }
  // grey: base grey tone of the layer. tint: how strongly the horizon colour
  // is mixed in (farther rings haze toward the horizon more).
  const layers=[
    {r:150,h:90,cy:15,grey:0x6f6f72,tint:0.35,seed:1.2,rs:37/90},
    {r:260,h:95,cy:17,grey:0x7c7c80,tint:0.5, seed:2.7,rs:43/95},
    {r:400,h:100,cy:20,grey:0x8c8c90,tint:0.65,seed:4.1,rs:53/100},
  ];
  return layers.map(L=>{
    const m=new THREE.Mesh(new THREE.CylinderGeometry(L.r,L.r,L.h,64,1,true),
      new THREE.MeshBasicMaterial({map:makeTex(L.seed,L.rs),color:L.grey,side:THREE.BackSide,transparent:true,alphaTest:.05,depthWrite:false,fog:false}));
    m.position.y=L.cy; m.frustumCulled=false;
    m.userData.baseGrey=new THREE.Color(L.grey);
    m.userData.tint=L.tint;
    scene.add(m); return m;
  });
}

function playBgm(key) {

  playingKey = key;
  if (!audioBufs[key]) return;
  const src = audioCtx.createBufferSource();

  playingSrc = src;
}

function parseSongLine(l) {
  const urlM=l.match(/https?:\/\/[^「\s]+/); if(!urlM) return null;
  const url=urlM[0], rest=l.slice(urlM.index+url.length).trim();
  const nameM=rest.match(/「([^」]*)」/); const name=nameM?nameM[1]:'';
  const kw=rest.replace(/「[^」]*」/,'');
  // 「空#」「地平線#」はスペース(半角/全角)を挟んでもよい
  const horizM=kw.match(/地平線[ 　]*(#[0-9a-fA-F]{6})/); const horiz=horizM?horizM[1]:null;
  const skyRawM=kw.match(/空[ 　]*(#[0-9a-fA-F]{6})/); const skyRaw=skyRawM?skyRawM[1]:null;
  // 「空#」「地平線#」を除いた残りから従来の単一色(#xxxxxx, ×0.42加工)を拾う
  const kwPlain=kw.replace(/地平線[ 　]*#[0-9a-fA-F]{6}/g,'').replace(/空[ 　]*#[0-9a-fA-F]{6}/g,'');
  const colorM=kwPlain.match(/#[0-9a-fA-F]{6}/); const color=colorM?colorM[0]:null;
  const volM=kw.match(/音量([+-]?\d+)[%％]/); const volAdj=volM?1+parseInt(volM[1])/100:1;
  const startM=kw.match(/開始(\d+)秒/); const startSec=startM?parseInt(startM[1]):0;
  const isYT=/youtube\.com|youtu\.be/.test(url);
  const vid=isYT?(url.match(/[?&]v=([^&]+)/)?.[1]||url):url.replace(/&amp;/g,'&');
  // 空デコ: 雲2→3, 雲1→2, 星→1, なし→0
  const deco=/雲2/.test(kw)?3:/雲1/.test(kw)?2:/星/.test(kw)?1:0;
  return {id:vid,type:isYT?'yt':'radio',name,color,skyRaw,rain:/雨/.test(kw),star:/星/.test(kw),deco,solid:/単色/.test(kw),horiz,volAdj,startSec};
}

async function loadPlaylist() {
  try {
    const text = await (await fetch('musiclist.txt')).text();
    const lines = text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
    const entries = [];
    for(const l of lines) {
      const plM = l.match(/^(プレイリスト「[^」]+」)(\.txt)?$/);
      if(plM) {
        const plName = plM[1];
        const filename = plName + '.txt';
        try {
          const plText = await (await fetch(filename)).text();
          const tracks = plText.split('\n').map(x=>x.trim()).filter(x=>x&&!x.startsWith('#'))
            .map(parseSongLine).filter(Boolean);
          if(tracks.length>0) entries.push({type:'playlist',name:plName,tracks,id:null,color:null,rain:false,star:false,volAdj:1});
        } catch(_) { /* file not found, skip */ }
        continue;
      }
      const urlM = l.match(/https?:\/\/[^「\s]+/);
      if(!urlM){ entries.push({type:'label',name:l,id:null}); continue; }
      const song = parseSongLine(l);
      if(song) entries.push(song);
    }
    if(entries.length>0){playlist=entries;}
  } catch(e){console.warn('[playlist] load failed');}
}

}

function selectTrack(delta) {
  if(displayMode>0){ displayMode=0; applyDisplayMode(); }

  if(playlistBrowse && currentPL) {
    const n = currentPL.tracks.length;
    plTrackIdx = ((plTrackIdx + delta) % n + n) % n;
    isBrowsing = true;
    connectingEl.style.display = 'block';
    setDisp(connectingEl,`${currentPL.name} ▷ ${trackLabel(currentPL.tracks[plTrackIdx])}`);
    clearTimeout(selectDebounce);
    return;
  }

  if(!playlist.length) return;
  playlistIdx=((playlistIdx+delta)%playlist.length+playlist.length)%playlist.length;
  const e=playlist[playlistIdx]; isBrowsing=(e.type!=='label');
  connectingEl.style.display='block';
  if(e.type==='label'){ connectingEl.textContent=`── ${e.name} ──`; }
  else if(e.type==='playlist'){
    const m=e.name.match(/^(プレイリスト)(「[^」]*」)$/);
    if(m) connectingEl.innerHTML=`${esc(m[1])}<br>${esc(m[2])}`;
    else connectingEl.textContent=e.name;
  } else { connectingEl.textContent=trackLabel(e); }
  clearTimeout(selectDebounce);
}

function playTrack(track, label) {

  applyHorizDirective(track.horiz);
  rainActive=!!track.rain; skyDecoMode=track.deco??(track.star?1:0); applySkyDeco();

  applyVolAdj();

  if(track.type==='radio'){ if(ytReady&&ytPlayer) ytPlayer.stopVideo(); playRadio(track.id); }

}

function confirmTrack() {
  if(!isBrowsing) return;
  if(musicPlaying&&!radioActive&&!(playlistBrowse&&currentPL)) return;

  if(playlistBrowse && currentPL) {
    const track = currentPL.tracks[plTrackIdx];
    playTrack(track, `${currentPL.name} ▷ ${trackLabel(track)}`);
    return;
  }

  const e = playlist[playlistIdx];
  if(e.type==='playlist') {
    playlistActive=true; playlistBrowse=true;
    currentPL=e; plTrackIdx=0;
    setPlActive(true);
    const track=e.tracks[0];
    playTrack(track, `${e.name} ▷ ${trackLabel(track)}`);
    return;
  }

  playlistActive=false; playlistBrowse=false; currentPL=null; setPlActive(false);
  playingIdx=playlistIdx;
  playTrack(e, trackLabel(e));
}

const zoneRocks=new Map();
function getRockZones(wx,wz){
  const s=new Set();
  if(wx<-1.6&&wz>=-97&&wz<=-65)s.add('sa04');
  if(wx>=1.6&&wz>=20.8&&wz<=23)s.add('sa05');
  if(wx<-1.6&&wz>=-93&&wz<=-55)s.add('sa06');
  if(wx<-1.6&&wz>=-47&&wz<=-16)s.add('sa07');
  return s;
}
function addRocks(){
  const colors=[0xd0d0cc,0xd9cc90,0xd4a08a,0xccb890];
  const rng=(a,b)=>a+Math.random()*(b-a);
  for(let i=0;i<3000;i++){
    const wx=rng(PLAY_X_MIN,PLAY_X_MAX),wz=rng(PLAY_Z_MIN,PLAY_Z_MAX);
    if(wx>=-2.1&&wx<=2.1)continue;
    const r=rng(.02,.0875),sx=rng(.7,1.3),sy=rng(.4,.85),sz=rng(.7,1.3);
    const rx=rng(0,Math.PI),ry=rng(0,Math.PI),rz=rng(0,Math.PI),ci=Math.floor(Math.random()*4);
    const zones=getRockZones(wx,wz);
    for(const dz of[0,-LOOP_LENGTH]){
      const rock=new THREE.Mesh(new THREE.IcosahedronGeometry(r,0),new THREE.MeshLambertMaterial({color:colors[ci]}));
      rock.scale.set(sx,sy,sz);rock.rotation.set(rx,ry,rz);rock.position.set(wx,r*sy*.45,wz+dz);
      scene.add(rock);if(zones.size>0)zoneRocks.set(rock,zones);
    }
  }
}

      const fix=mat=>{if(!mat)return;mat.transparent=false;mat.opacity=1;mat.depthWrite=true;mat.needsUpdate=true;};
      Array.isArray(c.material)?c.material.forEach(fix):fix(c.material);});
    m.scale.set(.4,.4,.4);m.visible=false;scene.add(m);trafficCars[i].mesh=m;
  },null,e=>console.warn(f,e));
});

function resetTrafficCars(){trafficCars.forEach(tc=>{tc.active=false;tc.done=false;tc.spawnElapsed=0;tc.relDist=0;if(tc.mesh)tc.mesh.visible=false;});}

let playerZDeltaFrame=0;
function updateAllTrafficCars(dt){
  if(!gameStartTime)return;
  const elapsed=getElapsedMs();
  let ce=elapsed-cycleStartElapsed;
  if(ce>=CYCLE_DURATION_MS){cycleStartElapsed+=CYCLE_DURATION_MS;ce-=CYCLE_DURATION_MS;resetTrafficCars();return;}
  for(const tc of trafficCars){
    if(!tc.mesh)continue;
    if(!tc.active&&!tc.done&&ce>=tc.spawnAt){
      if(ce-tc.spawnAt>SPAWN_WINDOW_MS){tc.done=true;}
      else{
        const sx=tc.oncoming?ONCOMING_X:SAMEDIR_X;
        let sz=camera.position.z-100;
        if(tc.oncoming)sz=Math.max(sz,PLAY_Z_MIN); else if(sz<PLAY_Z_MIN)sz+=LOOP_LENGTH;
        tc.mesh.position.set(sx,0,sz);tc.mesh.rotation.y=tc.oncoming?Math.PI:0;
        tc.mesh.visible=true;tc.active=true;tc.spawnElapsed=ce;tc.relDist=0;
      }
    }
    if(!tc.active)continue;
    if(ce-tc.spawnElapsed>=tc.lifetime){tc.mesh.visible=false;tc.active=false;tc.done=true;continue;}
    if(tc.oncoming){
      tc.mesh.position.z+=CAR_SPEED*dt;
      if(tc.mesh.position.z>=PLAY_Z_MAX){tc.mesh.visible=false;tc.active=false;tc.done=true;}
    } else {
      tc.mesh.position.z-=CAR_SPEED*dt;
      if(tc.mesh.position.z<PLAY_Z_MIN)tc.mesh.position.z+=LOOP_LENGTH;
      tc.relDist+=playerZDeltaFrame-CAR_SPEED*dt;
      if(tc.relDist>=SAMEDIR_EXIT_DIST){tc.mesh.visible=false;tc.active=false;tc.done=true;}
    }
  }
}

function loadSpecialModel(file,px,py,pz){
  return new Promise(resolve=>{
    new GLTFLoader().load(file+'?v='+Date.now(),gltf=>{
      const m=gltf.scene;
      m.traverse(c=>{if(!c.isMesh)return;c.frustumCulled=false;
        const fix=mat=>{if(!mat)return;if(mat.color&&mat.color.r>.6&&mat.color.g<.35&&mat.color.b>.5){c.visible=false;return;}mat.transparent=false;mat.opacity=1;mat.depthWrite=true;mat.needsUpdate=true;};
        Array.isArray(c.material)?c.material.forEach(fix):fix(c.material);});
      m.scale.set(.4,.4,.4);m.position.set(px,py,pz);m.visible=false;scene.add(m);
      const mc=m.clone();mc.position.set(px,py,pz-LOOP_LENGTH);mc.visible=false;scene.add(mc);
      resolve({main:m,copy:mc});
    },null,e=>{console.error(file,e);resolve(null);});
  });
}

// ─────────────────────────────────────────────
//  LOOP COURSE (map00.gltf + map01.gltf)
//  00 = straight road (bottom-centre ↔ top-centre)
//  01 = corner road   (bottom-centre ↔ right-centre)
//  Eight tiles are arranged in a 3×3 ring (centre empty) so the
//  road forms one continuous, closed lap:
//
//    01(L90) 00(L90) 01(180)        (col0,r-1)(col1,r-1)(col2,r-1)
//    00       ----    01(180)        (col0, r0)         (col2, r0)
//    01       00(R90) 01(R90)        (col0, r1)(col1,r1)(col2,r1)
// ─────────────────────────────────────────────
const COURSE_CELL = 40;            // world size of one tile (square)
const COURSE_Y    = 0.0;           // height of the road surface
// Y-rotation about the vertical axis: in three.js +π/2 turns North(+Z)→East(+X)
// (a "right"/clockwise turn seen from above), −π/2 turns North→West ("left").
const R0 = 0, R90 = Math.PI/2, R180 = Math.PI, RL90 = -Math.PI/2;
// Source tiles span x∈[0,TILE_SRC], z∈[-TILE_SRC,0] with Y=0 (flat in XZ).
const TILE_SRC = 2139194.5;
// ─── H・TS・OU記法 (grid layout notation) ──────────────────────────────────
//   H  = 俯瞰     : written exactly as seen from straight above (−Z up, +X right)
//   OU = 奥=画面上   : the TOP line; toward −Z. 手前=画面下: the BOTTOM line.
// Grid text: each LINE is a row (top=奥/−Z, bottom=手前), comma-separated CELLS
// are columns (left→right = +X). Each cell is "mapNN=deg"; an empty cell (blank
// between commas) means no tile. deg = CLOCKWISE (right) degrees (90=right90°,
// 270=left90°, 0=as-authored).
//   ★ marks the tile whose front-left corner is anchored at (x,y,z)=(0,0,0).
//   Other tiles are relative to it: cells to the LEFT of ★ get negative X,
//   cells toward 手前 (BELOW ★) get positive Z. If no ★, the bottom-left tile.
const COURSE_MAP = `
11,4-90,4-270,11-90,0,4
4-180,2,2-270,4,0,4-270
1,1-90,2-180,3,9,10-270
4,4,11,10-90,6,4
1-90,11-180,4-180,4-180,5-180,10-270
4-180,8,7,4,6-180,4
4,8,7,4,5,4-180
1-270,7-270,1,10-90,6,10-270
4-180,8,4-180,4,5-180,4-180
10-90,8,4,4-180,6,10-270
4,8,4-180,4,9-180,3-180
10-180,4,10-180,2-180,5,10-270
`;
const deg2yrot = deg => -deg * Math.PI / 180;   // clockwise(right)-positive → three.js Y

// Parse the grid text into tiles with grid coords. Bottom line → row 0 (手前,
// z near 0); higher lines → more negative rows (奥). Left column → col 0 (x=0).
// Returns { tiles, star } where star is the ★-marked tile's {col,row} (or null).
function parseCourseMap(text){
  const lines = text.split('\n').map(l=>l.replace(/\s+/g,'')).filter(l=>l.length>0);
  const n = lines.length;
  const tiles = [];
  let star = null;
  lines.forEach((line,r)=>{
    line.split(',').forEach((cell,c)=>{
      const hasStar = cell.includes('★');
      const raw = cell.replace('★','');
      // Accept "mapNN=deg", short "N-deg", or bare "N" (deg 0). N is zero-padded.
      let m, num, deg;
      if(m = raw.match(/^map(\d+)=(-?\d+)$/)){ num=m[1]; deg=parseInt(m[2],10); }
      else if(m = raw.match(/^(\d+)-(\d+)$/)){ num=String(+m[1]).padStart(2,'0'); deg=parseInt(m[2],10); }
      else if(m = raw.match(/^(\d+)$/)){ num=String(+m[1]).padStart(2,'0'); deg=0; }
      else return;                                    // empty / invalid cell
      const col = c, row = r - (n - 1);
      tiles.push({ file:`map${num}.gltf`, col, row, deg });
      if(hasStar) star = { col, row };
    });
  });
  return { tiles, star };
}
const { tiles: COURSE_TILES, star: COURSE_STAR } = parseCourseMap(COURSE_MAP);

// Normalise a loaded tile, centring it on its own origin and scaling it to
// exactly one COURSE_CELL square. The source geometry already lies flat in
// the XZ plane (vertices have Y=0 and span X/Z), so NO X-axis tilt is applied
// — only an optional Y-axis rotation for the course layout.
function makeCourseTile(src, yRot){
  const obj = src.clone(true);
  obj.traverse(c=>{ if(!c.isMesh) return; c.frustumCulled=false;
    const fix=mat=>{ if(!mat) return; mat.transparent=false; mat.opacity=1;
      mat.depthWrite=true; mat.side=THREE.DoubleSide; mat.needsUpdate=true; };
    Array.isArray(c.material)?c.material.forEach(fix):fix(c.material);
  });
  // Centre the geometry on the tile origin. NO extra flip/rotation — the tile
  // is placed exactly as authored (手前=下辺, 奥=上辺, road exits 下辺→右辺).
  obj.position.set(-TILE_SRC/2, 0, TILE_SRC/2);
  const flat = new THREE.Group();
  flat.add(obj);
  flat.scale.setScalar(COURSE_CELL / TILE_SRC);
  const pivot = new THREE.Group();                // course rotation about tile centre
  pivot.add(flat);
  pivot.rotation.y = yRot;
  return pivot;
}

// Anchor: the ★ tile's front-left corner → world (0,0,0); else the bottom-left
// tile (min col, max row). Other tiles fall relative (−X to the left, +Z 手前).
const _cCols = COURSE_TILES.map(t=>t.col), _cRows = COURSE_TILES.map(t=>t.row);
const _anchor = COURSE_STAR || { col: Math.min(..._cCols), row: Math.max(..._cRows) };
const COURSE_OFFSET_X = -_anchor.col * COURSE_CELL;
const COURSE_OFFSET_Z = -_anchor.row * COURSE_CELL;
// Centre of the whole course (for start position and top-down view), from the grid.
const COURSE_CENTER_X = ((Math.min(..._cCols)+Math.max(..._cCols))/2)*COURSE_CELL + COURSE_CELL/2 + COURSE_OFFSET_X;
const COURSE_CENTER_Z = ((Math.min(..._cRows)+Math.max(..._cRows))/2)*COURSE_CELL - COURSE_CELL/2 + COURSE_OFFSET_Z;
const TOPVIEW_HEIGHT=Math.max(
  (Math.max(..._cCols)-Math.min(..._cCols)+1),
  (Math.max(..._cRows)-Math.min(..._cRows)+1)
)*COURSE_CELL*0.95;
// Course world bounds (for toroidal wrap): top/bottom and left/right edges loop.
const _minC=Math.min(..._cCols), _maxC=Math.max(..._cCols);
const _minR=Math.min(..._cRows), _maxR=Math.max(..._cRows);
const COURSE_X_MIN = _minC*COURSE_CELL + COURSE_OFFSET_X;
const COURSE_X_MAX = (_maxC+1)*COURSE_CELL + COURSE_OFFSET_X;
const COURSE_Z_MIN = (_minR-1)*COURSE_CELL + COURSE_OFFSET_Z;
const COURSE_Z_MAX = _maxR*COURSE_CELL + COURSE_OFFSET_Z;
const COURSE_W = COURSE_X_MAX - COURSE_X_MIN, COURSE_D = COURSE_Z_MAX - COURSE_Z_MIN;
const _mod = (a,n)=>((a%n)+n)%n;
const wrapX = x => COURSE_X_MIN + _mod(x - COURSE_X_MIN, COURSE_W);
const wrapZ = z => COURSE_Z_MIN + _mod(z - COURSE_Z_MIN, COURSE_D);
// Start: centre of the bottom-left tile (最下段・左端).
const START_X = _minC*COURSE_CELL + COURSE_CELL/2 + COURSE_OFFSET_X;
const START_Z = _maxR*COURSE_CELL - COURSE_CELL/2 + COURSE_OFFSET_Z;

// ─── Per-map walkable areas (authored, not derived from geometry) ───────────
// Each tile is divided into a WALK_N × WALK_N sub-grid. Walkable sub-cells are
// listed per map type in 縦/横 (row/col), 1-based, on the UNROTATED tile:
//   縦 (row) 1..32 : 1 = 奥 (top of 俯瞰, −Z) … 32 = 手前 (bottom, +Z)
//   横 (col) 1..32 : 1 = 左 (−X) … 32 = 右 (+X)
// Each entry is "縦/横" (one cell) or "縦/横-縦/横" (inclusive rectangle range).
// A map not listed here is fully walkable; positions off every tile are blocked.
// The tile's rotation is applied automatically (define as if unrotated).
const WALK_N = 32;
const TILE_WALKABLE = {
  map00: ['1/15-32/18'],                                  // 高速道路 中央上下直線1
  map01: ['1/14-32/19', '14/1-19/32'],                    // 十字路
  map02: ['14/14-20/32', '21/14-32/19'],                  // 曲がり角
  map03: ['7/19-12/32', '1/13-32/20'],                    // 高速出入口と一般道接続
  map04: ['1/13-32/20'],                                  // 街中 中央上下直線
  map05: ['1/15-32/18'],                                  // 高速道路 直線2（建物密集）
  map06: ['1/15-32/18'],                                  // 高速道路 直線3（建物密集2）
  map07: ['1/13-32/20'],                                  // 街中 直線（池側道）
  map08: [],                                              // 池（通行不可）
  map09: ['1/15-20/18', '21/12-32/18', '8/1-12/13', '13/12-20/13'], // 高速出入口
  map10: ['14/1-20/32', '21/14-32/19'],                   // 三差路
  map11: ['14/14-20/32', '21/14-32/19'],                  // 曲がり角2
};
// Build a WALK_N×WALK_N boolean grid from "縦/横[-縦/横]" entries.
function buildWalkGrid(entries){
  const g = Array.from({length:WALK_N}, ()=>new Array(WALK_N).fill(false));
  for(const e of entries){
    const pts = e.split('-').map(s=>s.split('/').map(Number));
    const [r0,c0]=pts[0], [r1,c1]=pts[1]||pts[0];
    for(let r=Math.min(r0,r1); r<=Math.max(r0,r1); r++)
      for(let c=Math.min(c0,c1); c<=Math.max(c0,c1); c++)
        if(r>=1&&r<=WALK_N&&c>=1&&c<=WALK_N) g[r-1][c-1]=true;
  }
  return g;
}
const _walkGrids = {};
for(const k in TILE_WALKABLE) _walkGrids[k] = buildWalkGrid(TILE_WALKABLE[k]);
// Look up the tile occupying a grid cell.
const _tileByCell = new Map();
for(const t of COURSE_TILES) _tileByCell.set(t.col+','+t.row, t);
// Is world position (px,pz) inside a walkable sub-cell?
function isWalkable(px,pz){
  const col = Math.round((px - COURSE_OFFSET_X - COURSE_CELL/2)/COURSE_CELL);
  const row = Math.round((pz - COURSE_OFFSET_Z + COURSE_CELL/2)/COURSE_CELL);
  const tile = _tileByCell.get(col+','+row);
  if(!tile) return false;                                  // off the course → blocked
  const base = tile.file.replace('.gltf','');
  const grid = _walkGrids[base];
  if(!grid) return true;                                   // unlisted map → fully walkable
  const cx = col*COURSE_CELL + COURSE_CELL/2 + COURSE_OFFSET_X;
  const cz = row*COURSE_CELL - COURSE_CELL/2 + COURSE_OFFSET_Z;
  // Un-rotate the point into the tile's unrotated local frame, then normalise.
  const a = -deg2yrot(tile.deg);
  const lx = px - cx, lz = pz - cz;
  const rx = lx*Math.cos(a) + lz*Math.sin(a);
  const rz = -lx*Math.sin(a) + lz*Math.cos(a);
  const u = rx/COURSE_CELL + 0.5, v = rz/COURSE_CELL + 0.5;   // 0..1 (+X right, +Z 手前)
  if(u<0||u>=1||v<0||v>=1) return false;
  const c = Math.floor(u*WALK_N), r = Math.floor(v*WALK_N);   // 0-based; r along 縦, c along 横
  return grid[r][c];
}

// Single-map mode: use only nihonbashi.gltf (large map); loop/walkable disabled.
const USE_NIHONBASHI = true;
const NIHON_SIZE = 2000;                 // world size of the map's larger horizontal extent
let mapViewCX = COURSE_CENTER_X, mapViewCZ = COURSE_CENTER_Z, mapViewH = TOPVIEW_HEIGHT;

function buildNihonbashi(){
  new GLTFLoader().load('nihonbashi.gltf?v='+Date.now(), g=>{
    const m=g.scene;
    // Merge the ~1500 meshes by material into a few meshes to cut draw calls
    // (huge win, especially since the panorama renders the scene 6× per frame).
    m.updateMatrixWorld(true);
    const byMat=new Map();
    m.traverse(o=>{
      if(!o.isMesh||!o.geometry) return;
      const mat=Array.isArray(o.material)?o.material[0]:o.material;
      let geo=o.geometry.clone();
      // keep only position so all geometries in a group merge cleanly
      const pos=geo.getAttribute('position'); if(!pos) return;
      const ng=new THREE.BufferGeometry();
      ng.setAttribute('position', pos.clone());
      if(geo.index) ng.setIndex(geo.index.clone());
      ng.applyMatrix4(o.matrixWorld);
      if(!byMat.has(mat)) byMat.set(mat,[]);
      byMat.get(mat).push(ng);
    });
    const merged=new THREE.Group();
    for(const [mat,geos] of byMat){
      const mg=geos.length>1?BufferGeometryUtils.mergeGeometries(geos,false):geos[0];
      if(!mg) continue;
      mat.transparent=false; mat.opacity=1; mat.depthWrite=true; mat.side=THREE.DoubleSide; mat.needsUpdate=true;
      const mesh=new THREE.Mesh(mg, mat); mesh.frustumCulled=false;
      merged.add(mesh);
    }
    // Source is already flat in the XZ plane (X×Z horizontal, Y up) — no tilt.
    const flat=new THREE.Group(); flat.add(merged);
    scene.add(flat); flat.updateMatrixWorld(true);
    let box=new THREE.Box3().setFromObject(flat), size=box.getSize(new THREE.Vector3());
    const s = NIHON_SIZE/Math.max(size.x,size.z);
    flat.scale.setScalar(s); flat.updateMatrixWorld(true);
    box=new THREE.Box3().setFromObject(flat); const cen=box.getCenter(new THREE.Vector3());
    flat.position.x-=cen.x; flat.position.z-=cen.z;  // centre XZ; keep source y=0 at world y=0
    // Eye height scaled to the (large) map. Source y=0 is the ground.
    EYE_HEIGHT = s * 375;                    // viewpoint height (quartered from initial)
    mapViewCX=0; mapViewCZ=0; mapViewH=NIHON_SIZE*0.7;
    camera.position.set(-415,EYE_HEIGHT,-263); playerX=-415; playerZ=-263;
    loadingEl.style.display='none'; startOverlay.style.display='flex'; loadProgEl.textContent='';
  }, xhr=>{ if(xhr.total) loadProgEl.textContent=Math.round(xhr.loaded/xhr.total*100)+'%'; },
     err=>{ console.error(err); loadProgEl.textContent='読み込みエラー'; });
}

function buildLoopCourse(){
  if(USE_NIHONBASHI){ buildNihonbashi(); return; }
  const sources = {};
  const loader = new GLTFLoader();
  const files = [...new Set(COURSE_TILES.map(t=>t.file))];
  Promise.all(files.map(f=>new Promise(res=>{
    loader.load(f+'?v='+Date.now(), g=>{ sources[f]=g.scene; res(); },
      null, e=>{ console.error(f,e); res(); });
  }))).then(()=>{
    const course = new THREE.Group();
    course.name = 'loopCourse';
    for(const {file,col,row,deg} of COURSE_TILES){
      const src = sources[file];
      if(!src) continue;
      const tile = makeCourseTile(src, deg2yrot(deg));
      // Place at the CELL CENTRE so the (unrotated) front-left corner lands on
      // the grid point (col*CELL, row*CELL); the cell spans +X and −Z from there.
      tile.position.set(col*COURSE_CELL + COURSE_CELL/2 + COURSE_OFFSET_X, COURSE_Y,
                        row*COURSE_CELL - COURSE_CELL/2 + COURSE_OFFSET_Z);
      course.add(tile);
    }
    scene.add(course);

    // Place the vehicle on the start tile.
    camera.position.set(START_X, EYE_HEIGHT, START_Z);

    // Course is the whole map now: reveal the start screen once it is built.
    loadingEl.style.display='none';
    startOverlay.style.display='flex';
    loadProgEl.textContent='';
  });
}
buildLoopCourse();

// ─────────────────────────────────────────────
//  GAMEPAD CONTROLS
// ─────────────────────────────────────────────
(function(){
  const prev={}, hold={};

  function isDown(gp,idx){ const b=gp.buttons[idx]; if(!b) return false; return typeof b==='object'?b.pressed:!!b; }
  function btnVal(gp,idx){ const b=gp.buttons[idx]; if(!b) return 0; return typeof b==='object'?b.value:(b?1:0); }

  window._pollGamepad=function(){
    const pads=navigator.getGamepads?navigator.getGamepads():[];
    let gp=null;
    for(let i=0;i<pads.length;i++){ if(pads[i]){gp=pads[i];break;} }
    if(!gp) return;

    // Left stick X → steering (vehicle heading / handle)
    const stickX=gp.axes[0]||0;
    if(Math.abs(stickX)>0.12) yaw-=stickX*0.03;

    // Right stick → look around (offset from heading); release re-aligns.
    const rx=gp.axes[2]||0, ry=gp.axes[3]||0;
    let looking=false;
    if(Math.abs(rx)>0.15){ lookYaw-=rx*0.04; looking=true; }
    if(Math.abs(ry)>0.15){ lookPitch-=ry*0.03; looking=true; }
    lookYaw =Math.max(-Math.PI, Math.min(Math.PI, lookYaw));
    lookPitch=Math.max(-1.3, Math.min(1.3, lookPitch));
    if(!looking){                                   // snap back toward heading
      lookYaw*=0.85; lookPitch*=0.85;
      if(Math.abs(lookYaw)<1e-3) lookYaw=0;
      if(Math.abs(lookPitch)<1e-3) lookPitch=0;
    }

    // Rising-edge buttons
    function onPress(idx,fn){
      const cur=isDown(gp,idx);
      if(cur&&!prev[idx]) fn();
      prev[idx]=cur;
    }
    onPress(3, ()=>btnPlay.click());   // Y / △  → play/confirm
    onPress(0, ()=>btnHud.click());    // A / ×  → display toggle
    onPress(8, exitPlaylist);          // Select → exit playlist
    onPress(14,()=>seekYT(-10));       // D-pad left
    onPress(15,()=>seekYT(+10));       // D-pad right

    // RT(7)/LT(6) → speed
    const spd=(btnVal(gp,7)-btnVal(gp,6))*1.5;
    if(Math.abs(spd)>0.02){
      speedSlider.value=Math.min(100,Math.max(0,+speedSlider.value+spd));
      speedSlider.dispatchEvent(new Event('input'));
    }

    // D-pad up(12)/down(13) with hold-to-scroll
    function dpadHold(idx,delta){
      const cur=isDown(gp,idx);
      const was=!!prev[idx];
      if(cur&&!was){
        selectTrack(delta);
        hold[idx]=setTimeout(()=>{ hold['i'+idx]=setInterval(()=>selectTrack(delta<0?-5:5),200); },500);
      } else if(!cur&&was){
        clearTimeout(hold[idx]); clearInterval(hold['i'+idx]);
        hold[idx]=hold['i'+idx]=null;
      }
      prev[idx]=cur;
    }
    dpadHold(12,-1);
    dpadHold(13,+1);
  };
})();

// ─────────────────────────────────────────────
//  ANIMATION LOOP
// ─────────────────────────────────────────────
let lastT=performance.now();
const _fVec=new THREE.Vector3();

function getEffectiveYaw(){ return yaw; }

// Top-down overview of the whole course (toggle with the V key) — lets you
// verify the tile layout from above, like a map.
let topView=false, _savedFogDensity=null;
// Player ground position (kept separately because the top-down view hijacks
// the camera) and a marker shown for it in the V overview.
let playerX = START_X, playerZ = START_Z;
const POS_MARKER_Y = COURSE_CELL;                 // above the tiles, below the overhead camera
const posMarker = new THREE.Mesh(
  new THREE.SphereGeometry(COURSE_CELL*0.12, 16, 12),
  new THREE.MeshBasicMaterial({ color:0xff3030 })
);
posMarker.frustumCulled = false; posMarker.visible = false; posMarker.renderOrder = 999;
scene.add(posMarker);
function updateMovement(dt){
  if(!gameActive) return;

  if(topView){
    if(_savedFogDensity===null){ _savedFogDensity=scene.fog.density; }
    scene.fog.density=0;                 // clear haze so the whole map is visible
    // Honest top-down from ABOVE. up=-Z puts 奥(−Z) at the top of the screen
    // and +X (右辺) on the right — the orientation a real overhead view gives.
    camera.position.set(mapViewCX,mapViewH,mapViewCZ);
    camera.up.set(0,0,-1);
    camera.lookAt(mapViewCX,0,mapViewCZ);
    posMarker.visible=true;
    posMarker.position.set(playerX, POS_MARKER_Y, playerZ);   // user position
    return;
  }
  posMarker.visible=false;
  // Restore the player's ground position (no-op during normal play; needed
  // after leaving the top-down view, which moved the camera overhead).
  camera.position.x=playerX; camera.position.z=playerZ;
  if(_savedFogDensity!==null){ scene.fog.density=_savedFogDensity; _savedFogDensity=null; camera.up.set(0,1,0); }

  const effYaw=getEffectiveYaw();
  updateCruiseBgm();

  cruiseSpeed=+speedSlider.value/100*MAX_CRUISE;

  if(cruiseSpeed>0){
    let dx, dz;
    if(autoPilot){
      dz = -cruiseSpeed*dt;
      dx = (AP_TARGET_X-camera.position.x)*Math.min(.5*dt,1);
    } else {
      _fVec.set(0,0,-1).applyEuler(new THREE.Euler(0,effYaw,0));
      _fVec.y=0; _fVec.normalize();
      dx = _fVec.x*cruiseSpeed*dt;
      dz = _fVec.z*cruiseSpeed*dt;
    }
    if(USE_NIHONBASHI){
      // Single large map: free movement (no collision).
      camera.position.x+=dx; camera.position.z+=dz;
    } else {
      // Toroidal wrap (top/bottom and left/right edges loop) then restrict to
      // walkable areas. Try the full move, then each axis alone (slide along walls).
      const cx0=camera.position.x, cz0=camera.position.z;
      const nx=wrapX(cx0+dx), nz=wrapZ(cz0+dz);
      if(isWalkable(nx,nz)){ camera.position.x=nx; camera.position.z=nz; }
      else if(isWalkable(nx,cz0)){ camera.position.x=nx; }
      else if(isWalkable(cx0,nz)){ camera.position.z=nz; }
    }
  }

  // X-axis movement is no longer clamped — the player can move freely on X.
  // Z-loop warp removed: the player no longer teleports back at PLAY_Z_MIN.

  // Rock shake
  const now2=performance.now(), dt2=Math.min((now2-shakeT0)/1000,.05); shakeT0=now2;
  const onRocks=Math.abs(camera.position.x)>2.1, kmh=cruiseSpeed/MAX_CRUISE*120;
  if(onRocks&&kmh>=80){shakePhase=(shakePhase+dt2*18)%2;pitchShake=-(0.3125*Math.PI/180)*(1-Math.cos(Math.PI*shakePhase))/2;}
  else{shakePhase=0;pitchShake*=.85;}

  camera.position.y=EYE_HEIGHT;
  // Movement follows the vehicle heading (effYaw); the camera adds the manual
  // look offset (right stick). Yaw/pitch here drive the cylindrical panorama.
  camera.rotation.set(pitch+lookPitch+pitchShake, effYaw+lookYaw, 0);
  playerX=camera.position.x; playerZ=camera.position.z;   // remember ground position
}

// ── Cylindrical panorama (seamless ultra-wide view for curved displays) ──────
// Render the scene into a cubemap each frame, then resample it cylindrically to
// a full-screen quad: horizontal = linear angle (no seams / no rectilinear
// edge-stretch), so it wraps naturally across a curved/triple screen.
let PANO_HFOV = 120 * Math.PI/180;          // horizontal field of view (tunable)
const _panoCubeRT = new THREE.WebGLCubeRenderTarget(768, { minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter });
const _panoCubeCam = new THREE.CubeCamera(0.05, 6000, _panoCubeRT);
const _panoScene = new THREE.Scene();
const _panoCam = new THREE.Camera();
const _panoMat = new THREE.ShaderMaterial({
  uniforms:{ tCube:{value:_panoCubeRT.texture}, yaw:{value:0}, pitch:{value:0}, hfov:{value:PANO_HFOV}, vfov:{value:PANO_HFOV*0.55}, vcrop:{value:0.10} },
  depthTest:false, depthWrite:false,
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.0,1.0); }`,
  fragmentShader:`
    precision highp float;
    uniform samplerCube tCube; uniform float yaw,pitch,hfov,vfov,vcrop; varying vec2 vUv;
    void main(){
      float a=(vUv.x-0.5)*hfov;       // horizontal angle (cylinder around Y)
      // Drop the most-downward 'vcrop' of the vertical range (largest distortion),
      // then fill the screen with the remainder.
      float fy=vcrop+(1.0-vcrop)*vUv.y;
      float t=tan((fy-0.5)*vfov);     // vertical: rectilinear (keeps verticals straight)
      vec3 d=vec3(sin(a), t, -cos(a));   // local, forward = -Z (cylinder)
      float cp=cos(pitch), sp=sin(pitch);
      d=vec3(d.x, d.y*cp - d.z*sp, d.y*sp + d.z*cp);        // pitch about X
      float cy=cos(yaw), sy=sin(yaw);
      d=vec3(d.x*cy + d.z*sy, d.y, -d.x*sy + d.z*cy);       // yaw about Y
      gl_FragColor=textureCube(tCube, d);
    }`
});
_panoScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), _panoMat));

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(), dt=Math.min((now-lastT)/1000,.05); lastT=now;
  const prevZ=camera.position.z;
  updateMovement(dt);
  playerZDeltaFrame=prevZ-camera.position.z;
  if(playerZDeltaFrame<-LOOP_LENGTH/2)playerZDeltaFrame+=LOOP_LENGTH;
  updateAllTrafficCars(dt);

  for(const ring of mountainRings){
    ring.position.x=camera.position.x; ring.position.z=camera.position.z;
    ring.visible=!skyIsBlack;
    // Grey base tinted toward a darkened horizon colour (keeps a visible silhouette)
    _mtnTint.copy(skyHorizTarget).multiplyScalar(MTN_HORIZON_DARKEN);
    ring.material.color.copy(ring.userData.baseGrey).lerp(_mtnTint,ring.userData.tint);
  }
  extDesertPlane.position.x=camera.position.x;

  const sp=.025;
  skyUniforms.topColor.value.lerp(skyTopTarget,sp);
  skyUniforms.horizonColor.value.lerp(skyHorizTarget,sp);
  skyUniforms.horizonBandColor.value.lerp(skyHorizBandTarget,sp);
  scene.fog.color.lerp(GROUND_FOG_COLOR,sp);
  skyMesh.position.copy(camera.position);

  if(colorHudOn){
    // 遷移途中ではなく最終目標色を表示(途中の値は僅かに暗くズレるため)。
    // 「空#… 地平線#…」をmusiclistに手入力すれば3バーの見た目を再現できる。
    colorHudEl.textContent='空#'+skyTopTarget.getHexString().toUpperCase()
      +'　地平線#'+skyHorizTarget.getHexString().toUpperCase();
  }

  window._updateRain();
  window._updateStars();
  window._updateClouds(dt);
  window._pollGamepad();

  if(gameActive){
    hudSpeedEl.textContent=Math.round(cruiseSpeed/MAX_CRUISE*120);
  }

  // Vehicle position on the map plane: X = left/right (right +), Z = near/far (奥 −).
  coordHudEl.textContent='X '+camera.position.x.toFixed(1)+'　Z '+camera.position.z.toFixed(1);

  // Single full-screen forward view (seamless). Camera orientation (including
  // the steering look-ahead) is set in updateMovement / for the top-down view.
  renderer.setScissorTest(false);
  const W=wrapper.clientWidth, H=Math.max(1,wrapper.clientHeight);
  renderer.setViewport(0,0,W,H);
  if(topView){
    // Overhead view: ordinary single rectilinear render.
    camera.aspect=W/H;
    const hf=HORIZONTAL_FOV_DEG*Math.PI/180;
    camera.fov=2*Math.atan(Math.tan(hf/2)/camera.aspect)*180/Math.PI;
    camera.updateProjectionMatrix();
    renderer.render(scene,camera);
  } else {
    // Seamless cylindrical panorama: render scene to cubemap, then resample.
    _panoCubeCam.position.copy(camera.position);
    _panoCubeCam.update(renderer, scene);
    _panoMat.uniforms.yaw.value = camera.rotation.y;
    _panoMat.uniforms.pitch.value = camera.rotation.x;
    _panoMat.uniforms.hfov.value = PANO_HFOV;
    _panoMat.uniforms.vfov.value = PANO_HFOV * (H/W);
    renderer.setViewport(0,0,W,H);
    renderer.render(_panoScene, _panoCam);
  }
}

onResize();
animate();
</script>
</body>
</html>
